<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark background -->
  <rect width="32" height="32" rx="7" fill="#0f1117"/>
  <!-- Compass rose / north star mark -->
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="11" stroke="#2a2d37" stroke-width="1.5"/>
  <!-- North pointer (teal, bold) -->
  <path d="M16 5 L18.2 14.2 L16 13 L13.8 14.2 Z" fill="#14b8a6"/>
  <!-- South pointer (dimmed) -->
  <path d="M16 27 L17.4 18 L16 19 L14.6 18 Z" fill="#2a2d37"/>
  <!-- East pointer -->
  <path d="M27 16 L18 14.8 L19 16 L18 17.2 Z" fill="#2a2d37"/>
  <!-- West pointer -->
  <path d="M5 16 L14 17.2 L13 16 L14 14.8 Z" fill="#2a2d37"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="2" fill="#14b8a6"/>
  <!-- N label -->
  <text x="16" y="10" text-anchor="middle" dominant-baseline="middle" font-family="Inter,sans-serif" font-size="4" font-weight="700" fill="#14b8a6">N</text>
</svg>
