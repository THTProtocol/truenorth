<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="TrueNorth — AI orchestration harness dashboard. Route prompts through LLM providers, manage memory, execute tools, and visualize reasoning graphs." />
  <meta name="color-scheme" content="dark light" />

  <!-- Open Graph -->
  <meta property="og:title" content="TrueNorth Dashboard" />
  <meta property="og:description" content="AI orchestration harness — reasoning graphs, session management, memory browser, skills and tools." />
  <meta property="og:type" content="website" />

  <title>TrueNorth — AI Orchestration Dashboard</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />

  <!-- Fonts: Inter + JetBrains Mono via Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet"
  />

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css" />

  <!-- Mermaid.js (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js" defer></script>
</head>
<body>
  <div id="app">
    <!-- ── Application Header ────────────────────────────────── -->
    <header class="app-header" role="banner">

      <!-- Hamburger (mobile) -->
      <button
        class="hamburger"
        id="hamburger-btn"
        aria-label="Toggle navigation"
        aria-expanded="false"
        aria-controls="session-sidebar"
      >
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>

      <!-- Logo -->
      <a class="logo" href="#/" aria-label="TrueNorth home">
        <!-- North Star / Compass SVG logo -->
        <svg
          aria-label="TrueNorth logo"
          width="24"
          height="24"
          viewBox="0 0 32 32"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <!-- Outer ring -->
          <circle cx="16" cy="16" r="13" stroke="currentColor" stroke-width="1" opacity="0.2"/>
          <!-- North pointer (bold, teal via currentColor) -->
          <path d="M16 3 L18.5 14.5 L16 13 L13.5 14.5 Z" fill="currentColor"/>
          <!-- South pointer -->
          <path d="M16 29 L17.8 17.5 L16 19 L14.2 17.5 Z" fill="currentColor" opacity="0.3"/>
          <!-- East pointer -->
          <path d="M29 16 L17.5 14.2 L19 16 L17.5 17.8 Z" fill="currentColor" opacity="0.3"/>
          <!-- West pointer -->
          <path d="M3 16 L14.5 17.8 L13 16 L14.5 14.2 Z" fill="currentColor" opacity="0.3"/>
          <!-- Center -->
          <circle cx="16" cy="16" r="2.5" fill="currentColor"/>
          <!-- N marker -->
          <text x="16" y="9.5" text-anchor="middle" dominant-baseline="middle" font-family="Inter,sans-serif" font-size="4.5" font-weight="700" fill="currentColor" opacity="0.7">N</text>
        </svg>
        <span>TrueNorth</span>
      </a>

      <!-- Main Navigation -->
      <nav class="header-nav" role="navigation" aria-label="Main navigation">
        <a href="#/" aria-label="Dashboard" class="active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="9" rx="1"/>
            <rect x="14" y="3" width="7" height="5" rx="1"/>
            <rect x="14" y="12" width="7" height="9" rx="1"/>
            <rect x="3" y="16" width="7" height="5" rx="1"/>
          </svg>
          <span class="nav-label">Dashboard</span>
        </a>
        <a href="#/memory" aria-label="Memory">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <ellipse cx="12" cy="5" rx="9" ry="3"/>
            <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/>
            <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
          </svg>
          <span class="nav-label">Memory</span>
        </a>
        <a href="#/skills" aria-label="Skills">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
          </svg>
          <span class="nav-label">Skills</span>
        </a>
        <a href="#/tools" aria-label="Tools">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
          </svg>
          <span class="nav-label">Tools</span>
        </a>
        <a href="#/settings" aria-label="Settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.07 4.93l-1.41 1.41M5.34 18.66l-1.41 1.41M22 12h-2M4 12H2M19.07 19.07l-1.41-1.41M5.34 5.34L3.93 3.93"/>
          </svg>
          <span class="nav-label">Settings</span>
        </a>
      </nav>

      <div class="header-spacer"></div>

      <!-- Header actions: health badge, theme toggle -->
      <div class="header-actions">
        <!-- Health status -->
        <div
          id="health-badge"
          class="status-badge checking"
          role="status"
          aria-live="polite"
          aria-label="Agent health status"
        >
          <span class="dot"></span>
          <span>Checking</span>
        </div>

        <!-- Theme toggle -->
        <button
          id="theme-toggle"
          aria-label="Switch to light mode"
          title="Toggle theme"
        >
          <!-- Icon injected by JS -->
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- ── Main App Body ────────────────────────────────────── -->
    <div class="app-body">
      <!-- Page content area — router renders here -->
      <div id="main-content" class="page-content" style="height:100%;"></div>
    </div>
  </div>

  <!-- Toast container -->
  <div
    id="toast-container"
    class="toast-container"
    role="region"
    aria-live="assertive"
    aria-label="Notifications"
  ></div>

  <!-- Scripts (order matters) -->
  <script src="js/api.js"></script>
  <script src="js/websocket.js"></script>
  <script src="js/mermaid-init.js"></script>
  <script src="js/events.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
