app = "truenorth"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  TRUENORTH_LOG_LEVEL = "info"
  TRUENORTH_DATA_DIR = "/data/truenorth"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  size = "shared-cpu-2x"
  memory = "1gb"

[mounts]
  source = "truenorth_data"
  destination = "/data/truenorth"
